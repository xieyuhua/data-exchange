# 数据交换系统 配置文件
# 系统数据库支持 sqlite 与 mysql 两种存储方式

database:
  # 存储类型: sqlite 或 mysql
  type: sqlite

  # 当 type=sqlite 时使用的数据库文件路径
  sqlite_path: data.db

  # 当 type=mysql 时使用的连接配置
  mysql:
    host: 127.0.0.1
    port: 3306
    user: root
    password: ""
    database: data_exchange
    # 连接参数，一般保持默认即可
    params: "charset=utf8mb4&parseTime=True&loc=Local"

# 前端静态资源目录(外部目录)。留空则使用编译期嵌入的前端资源。
# 该目录应包含 index.html 与 assets/ (即 vite 构建产物，通常指向 static/ 目录)。
# 也可直接指向 static 的上级目录，程序会自动探测其中的 static 子目录。
# 也可通过命令行参数 -web-root 覆盖本配置。
web_root: ""

# 启动时是否自动建表(含默认数据初始化)。
# true(默认): 启动时执行 AutoMigrate，自动创建/更新表结构并写入默认配置与管理员账号。
# false: 跳过自动建表，表结构需由外部维护(例如数据库已存在表结构、或由 DBA 手动管理)。
# 不写此项时按 true 处理。
auto_migrate: true
